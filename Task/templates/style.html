<style>
            :root {
            --primary-color: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --light-bg: #f8fafc;
            --border-color: #e2e8f0;
            --text-dark: #334155;
            --text-light: #64748b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: var(--text-dark);
        }
        
        /* Sidebar Styles */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 280px;
            background: white;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.03);
            padding: 30px 20px;
            overflow-y: auto;
            z-index: 1000;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 40px;
            padding-left: 10px;
        }
        
        .logo span {
            color: var(--accent-color);
        }
        
        .nav-menu {
            list-style: none;
            padding: 0;
        }
        
        .nav-item {
            margin-bottom: 5px;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 10px;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .nav-link i {
            margin-right: 12px;
            font-size: 18px;
            width: 24px;
        }
        
        .nav-link:hover, .nav-link.active {
            background: var(--light-bg);
            color: var(--accent-color);
        }
        
        .nav-link.active {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-color);
        }
        
        .bottom-nav {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
        }
        
        /* Main Content */
        .main-content {
            margin-left: 280px;
            padding: 30px;
        }
        
        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .page-title h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .page-title p {
            color: var(--text-light);
            margin: 0;
        }
        
        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .notification-badge {
            position: relative;
            cursor: pointer;
        }
        
        .notification-badge i {
            font-size: 20px;
            color: var(--text-light);
        }
        
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #9feb25 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Search and Filter Bar */
        .search-filter-bar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
        }
        
        .search-box {
            position: relative;
            margin-bottom: 15px;
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }
        
        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .filter-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-tab {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-light);
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .filter-tab i {
            font-size: 12px;
        }
        
        .filter-tab:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        
        .filter-tab.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        
        .filter-tab.active i {
            color: white;
        }
        
        /* View Options */
        .view-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .view-toggle {
            display: flex;
            gap: 5px;
            background: white;
            border-radius: 8px;
            padding: 3px;
        }
        
        .view-btn {
            padding: 8px 12px;
            border: none;
            background: transparent;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        
        .view-btn:hover {
            color: var(--accent-color);
        }
        
        .view-btn.active {
            background: var(--light-bg);
            color: var(--accent-color);
        }
        
        .task-stats {
            display: flex;
            gap: 15px;
            color: var(--text-light);
            font-size: 14px;
        }
        
        .task-stats span {
            color: var(--accent-color);
            font-weight: 600;
        }
        
        /* Tasks Container */
        .tasks-container {
            min-height: 500px;
        }
        
        /* List View */
        .task-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
        }
        
        .task-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-color: var(--accent-color);
        }
        
        .task-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }
        
        .task-content {
            flex: 1;
        }
        
        .task-title {
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .task-title.completed {
            text-decoration: line-through;
            color: var(--text-light);
        }
        
        .task-badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .badge-priority {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .priority-high {
            background: #fee2e2;
            color: var(--danger-color);
        }
        
        .priority-medium {
            background: #fff3cd;
            color: var(--warning-color);
        }
        
        .priority-low {
            background: #d1fae5;
            color: var(--success-color);
        }
        
        .badge-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: var(--light-bg);
            color: var(--text-light);
        }
        
        .badge-category {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            background: #e0f2fe;
            color: #0369a1;
        }
        
        .task-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-light);
        }
        
        .task-meta i {
            margin-right: 5px;
            font-size: 12px;
        }
        
        .due-date.overdue {
            color: var(--danger-color);
            font-weight: 500;
        }
        
        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .task-item:hover .task-actions {
            opacity: 1;
        }
        
        .task-action-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: none;
            background: var(--light-bg);
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .task-action-btn:hover {
            background: var(--accent-color);
            color: white;
        }
        
        .task-action-btn.delete:hover {
            background: var(--danger-color);
        }
        
        /* Grid View */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            display: none;
        }
        
        .tasks-grid.active {
            display: grid;
        }
        
        .task-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .task-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(204, 19, 19, 0.1);
            border-color: var(--accent-color);
        }
        
        .task-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .task-card-title {
            font-weight: 600;
            font-size: 16px;
        }
        
        .task-card-badges {
            display: flex;
            gap: 5px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        
        .task-card-meta {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
            font-size: 13px;
            color: var(--text-light);
        }
        
        .task-card-meta div i {
            width: 18px;
            margin-right: 8px;
        }
        
        .task-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }
        
        .task-card-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: var(--light-bg);
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
        }
        
        .task-card-btn:hover {
            background: var(--accent-color);
            color: white;
        }
        
        /* Bulk Actions */
        .bulk-actions {
            background: white;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
            display: none;
        }
        
        .bulk-actions.active {
            display: flex;
        }
        
        .selected-count {
            font-size: 14px;
            font-weight: 500;
        }
        
        .bulk-buttons {
            display: flex;
            gap: 10px;
        }
        
        .bulk-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: var(--light-bg);
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .bulk-btn:hover {
            background: var(--accent-color);
            color: white;
        }
        
        .bulk-btn.delete:hover {
            background: var(--danger-color);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }
        
        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover, .page-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }
        
        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #2563eb 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            z-index: 100;
        }
        
        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .sidebar.active {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .task-item {
                flex-wrap: wrap;
            }
            
            .task-actions {
                opacity: 1;
                margin-left: auto;
            }
            
            .bulk-actions {
                flex-wrap: wrap;
            }
        }
</style>

<style>
            :root {
            --primary-color: #1e293b;
            --accent-color: #3b82f6;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --light-bg: #f8fafc;
            --border-color: #e2e8f0;
            --text-dark: #334155;
            --text-light: #64748b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
        }
        
        /* Left Side - Login Form */
        .form-side {
            flex: 1;
            padding: 50px;
            background: white;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 40px;
        }
        
        .logo span {
            color: var(--accent-color);
        }
        
        .form-header {
            margin-bottom: 30px;
        }
        
        .form-header h2 {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        .form-header p {
            color: var(--text-light);
            font-size: 16px;
        }
        
        /* Form Fields */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group .form-control {
            padding-right: 45px;
        }
        
        .input-group-text {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            z-index: 10;
        }
        
        .input-group-text:hover {
            color: var(--accent-color);
        }
        
        /* Form Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: var(--accent-color);
        }
        
        .remember-me label {
            font-size: 14px;
            color: var(--text-light);
            cursor: pointer;
        }
        
        .forgot-link {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .forgot-link:hover {
            text-decoration: underline;
        }
        
        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #2563eb 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login.loading {
            background: linear-gradient(135deg, #93c5fd 0%, #60a5fa 100%);
            pointer-events: none;
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        
        .divider span {
            padding: 0 15px;
            color: var(--text-light);
            font-size: 14px;
        }
        
        /* Social Login */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: white;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .social-btn:hover {
            background: var(--light-bg);
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }
        
        .social-btn.google {
            color: #ea4335;
        }
        
        .social-btn.google:hover {
            background: #fef2f2;
        }
        
        .social-btn.facebook {
            color: #4267B2;
        }
        
        .social-btn.facebook:hover {
            background: #e7f0ff;
        }
        
        .social-btn i {
            font-size: 18px;
        }
        
        /* Register Link */
        .register-link {
            text-align: center;
            font-size: 15px;
            color: var(--text-light);
        }
        
        .register-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        /* Error States */
        .form-control.is-invalid {
            border-color: var(--danger-color);
        }
        
        .error-message {
            color: var(--danger-color);
            font-size: 12px;
            margin-top: 5px;
        }
        
        /* Success Message */
        .success-message {
            background: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .success-message i {
            font-size: 18px;
        }
        
        /* Right Side - Illustration */
        .illustration-side {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .illustration-side::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .illustration-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }
        
        .illustration-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .illustration-side h3 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .illustration-side p {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.6;
            margin-bottom: 40px;
            max-width: 350px;
        }
        
        .testimonial {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            max-width: 350px;
